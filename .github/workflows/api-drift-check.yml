name: API Drift Check

on:
    schedule:
        # Mondays at 14:00 UTC
        - cron: "0 14 * * 1"
    workflow_dispatch:

permissions:
    issues: write

jobs:
    compare-to-api:
        name: Compare to API
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6.0.2
            - name: Setup Node.js
              uses: actions/setup-node@v6.3.0
              with:
                  node-version: "22"
            - name: Install Dependencies
              run: npm install
            - name: Diff the generated types with the API
              id: diff
              run: |
                  mv clientAutogen.ts clientAutogen.ts.old
                  mv swaggerSchema.d.ts swaggerSchema.d.ts.old
                  npm run generate
                  set +e
                  diff clientAutogen.ts clientAutogen.ts.old
                  client_diff=$?
                  diff swaggerSchema.d.ts swaggerSchema.d.ts.old
                  schema_diff=$?
                  set -e
                  if [ "$client_diff" -ne 0 ] || [ "$schema_diff" -ne 0 ]; then
                    echo "drift=true" >> "$GITHUB_OUTPUT"
                    exit 1
                  fi
            - name: Close drift issue
              if: success()
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = "Scheduled check: API schema drift detected";
                      const { data: issues } = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: "open",
                        per_page: 100,
                      });

                      for (const issue of issues) {
                        if (issue.title === title) {
                          await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: issue.number,
                            body: "Weekly drift check passed on main. Closing this issue.",
                          });
                          await github.rest.issues.update({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: issue.number,
                            state: "closed",
                          });
                        }
                      }
            - name: Report drift
              if: failure() && steps.diff.outputs.drift == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = "Scheduled check: API schema drift detected";
                      const body = [
                        "The weekly API drift check found differences between the live Vantage OpenAPI schema and the checked-in generated files on `main`.",
                        "",
                        "To update the SDK:",
                        "```bash",
                        "npm run generate",
                        "```",
                        "",
                        `Workflow run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
                      ].join("\n");

                      const { data: issues } = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: "open",
                        per_page: 100,
                      });

                      const existing = issues.find((issue) => issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: existing.number,
                          body: `${body}\n\nStill out of date as of this week's check.`,
                        });
                        return;
                      }

                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title,
                        body,
                      });
