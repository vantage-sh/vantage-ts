name: Publish Package

on:
  push:
    branches:
      - main
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

concurrency:
  group: publish-package
  cancel-in-progress: false

permissions:
  id-token: write # Required for OIDC
  contents: write
  pull-requests: read

jobs:
  publish:
    if: >-
      github.event_name != 'pull_request_review' ||
      (
        github.event.review.state == 'approved' &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.ref == 'sync/api-client' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login == 'github-actions[bot]'
      )
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Resolve ref to publish
        id: publish-ref
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request_review" ]; then
            echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for i in $(seq 1 60); do
            PR="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
            if [ "$(jq -r '.merged' <<< "$PR")" = "true" ]; then
              MERGE_SHA="$(jq -r '.merge_commit_sha' <<< "$PR")"
              echo "Publishing merged PR #${PR_NUMBER} at ${MERGE_SHA}."
              echo "ref=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$(jq -r '.state' <<< "$PR")" = "closed" ]; then
              echo "PR #${PR_NUMBER} was closed without merging."
              exit 1
            fi

            echo "Waiting for PR #${PR_NUMBER} to auto-merge (attempt ${i}/60)..."
            sleep 5
          done

          echo "PR #${PR_NUMBER} did not auto-merge within 5 minutes."
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.publish-ref.outputs.ref }}

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11
        run: npm install -g npm@11.12.1

      - run: npm ci

      - name: Get the version and create a tag/publish if it doesn't exist
        run: |
          VERSION=$(jq -r '.version' package.json)
          if git tag -l "v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists"
          else
            echo "Tag v$VERSION does not exist"

            # Build the package and publish it
            npm run build
            npm publish --provenance

            # Push the tag to the remote repository
            git tag "v$VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git push origin "v$VERSION"
          fi
